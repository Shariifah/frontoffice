<div class="max-w-md mx-auto mt-20 p-6 bg-white rounded-lg shadow-lg">
  <h2 class="text-2xl font-bold mb-2">Finaliser l’inscription</h2>
  <p class="text-gray-600 mb-6">Complétez vos informations pour créer un compte</p>

  <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700">Prénom</label>
      <input pInputText formControlName="firstname" class="w-full mt-1 p-2 border border-gray-300 rounded-md" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700">Nom</label>
      <input pInputText formControlName="lastname" class="w-full mt-1 p-2 border border-gray-300 rounded-md" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700">Mot de passe</label>
      <input pPassword formControlName="password" toggleMask class="w-full mt-1" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700">Confirmer le mot de passe</label>
      <input pPassword formControlName="verifyPassword" toggleMask class="w-full mt-1" />
    </div>

    <button
      pButton
      type="submit"
      label="Créer le compte"
      class="w-full"
      [loading]="loading"
      [disabled]="form.invalid || loading"
    ></button>
  </form>
</div>

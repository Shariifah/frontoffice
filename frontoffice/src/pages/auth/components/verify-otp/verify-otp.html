<div class="max-w-md mx-auto mt-20 p-6 bg-white rounded-lg shadow-lg">
  <h2 class="text-2xl font-bold mb-2">Vérification du code</h2>
  <p class="text-gray-600 mb-6">Un code a été envoyé au <strong>{{ phonenumber }}</strong></p>

  <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
    <div>
      <label for="otp" class="block text-sm font-medium text-gray-700">Code OTP</label>
      <input
        pInputText
        id="otp"
        formControlName="otp"
        placeholder="1234"
        class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500"
      />
    </div>

    <button
      pButton
      type="submit"
      label="Vérifier"
      class="w-full"
      [loading]="loading"
      [disabled]="form.invalid || loading"
    ></button>
  </form>
</div>
